version: '3.8'

services:
  mongodb:
    image: mongo:6
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: crm_db

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/crm_db
      JWT_SECRET: change_this_in_production
      JWT_EXPIRES_IN: 7d
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin123
      CLIENT_URL: http://localhost:3000
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
